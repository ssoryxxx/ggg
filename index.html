    :root {
        --ink: #192b3a;
        --ink-soft: #2e4154;
        --muted: #5a7085;
        --accent: #2f7f8b;
        --accent-dark: #246670;
        --accent-2: #f29f3d;
        --accent-2-dark: #d9811f;
        --surface: #ffffff;
        --surface-2: #f3f7fb;
        --surface-3: #e9f1f7;
        --line: #d7e3ee;
        --danger: #c2463f;
        --danger-dark: #9f2f2a;
        --success: #2f8b57;
        --shadow: 0 20px 40px -24px rgba(22, 45, 62, 0.45);
        --shadow-soft: 0 8px 18px rgba(22, 45, 62, 0.12);
        --radius-sm: 14px;
        --radius: 22px;
        --radius-lg: 28px;
        --radius-pill: 999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'IBM Plex Sans', sans-serif;
        background:

        padding: calc(20px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));
        min-height: 100vh;
        -webkit-text-size-adjust: 100%;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
            radial-gradient(circle, rgba(255,255,255,0.35) 1px, transparent 1px);
        background-size: 22px 22px;
        opacity: 0.18;
        pointer-events: none;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1.4rem;
    }

    .header-actions {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
    }

    h1 {
        font-family: 'Yeseva One', 'IBM Plex Sans', serif;
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: 0.2px;
        color: var(--ink);
    }

    h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: var(--ink);
        border-left: 4px solid var(--accent);
        padding-left: 0.9rem;
    }

    h3 {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--ink);
    }

    .card {
        background: rgba(255,255,255,0.92);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 1.8rem;
        margin-bottom: 2rem;
        border: 1px solid rgba(255,255,255,0.7);
        backdrop-filter: blur(6px);
        animation: rise 0.5s ease both;
    }

    .btn,
    button {
        background: var(--accent);
        border: none;
        color: white;
        padding: 0.55rem 1rem;
        border-radius: var(--radius-pill);
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        font-size: 0.9rem;
        box-shadow: var(--shadow-soft);
        font-family: inherit;
    }

    .btn:hover,
    button:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
    }

    .btn-primary { background: var(--accent); }
    .btn-primary:hover { background: var(--accent-dark); }

    .btn-warn { background: var(--accent-2); }
    .btn-warn:hover { background: var(--accent-2-dark); }

    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: var(--danger-dark); }

    .btn-ghost,
    .btn-outline {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink);
        box-shadow: none;
    }
    .btn-ghost:hover,
    .btn-outline:hover {
        background: var(--surface-2);
    }

    .btn-xs {
        padding: 0.35rem 0.7rem;
        font-size: 0.78rem;
        box-shadow: none;
    }

    .form-grid {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
    }

    label {
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--ink-soft);
    }

    input, textarea, select {
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        font-family: inherit;
        font-size: 0.95rem;
        background: var(--surface);
        color: var(--ink);
        box-shadow: inset 0 1px 2px rgba(20, 35, 50, 0.06);
    }

    input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: rgba(47,127,139,0.6);
        box-shadow: 0 0 0 3px rgba(47,127,139,0.15);
    }

    textarea {
        min-height: 90px;
        resize: vertical;
    }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.8rem;
        margin-top: 1rem;
    }

    .toggle-switch {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .toggle-switch input {
        width: 44px;
        height: 24px;
        appearance: none;
        background: #cbd5e1;
        border-radius: 30px;
        position: relative;
        cursor: pointer;
        box-shadow: inset 0 1px 2px rgba(20, 35, 50, 0.15);
    }

    .toggle-switch input:checked {
        background: var(--accent);
    }

    .toggle-switch input::before {
        content: '';
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 2px;
        left: 2px;
        transition: 0.2s;
    }

    .toggle-switch input:checked::before {
        left: 22px;
    }

    .toggle-switch .toggle-text {
        font-size: 0.8rem;
        color: var(--muted);
    }

    .form-item {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 1.2rem;
        border: 1px solid var(--line);
        box-shadow: var(--shadow-soft);
        margin-bottom: 1.4rem;
    }

    .form-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.8rem;
    }

    .form-title-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
    }

    .form-desc {
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 0.35rem;
    }

    .pill {
        background: #e7f1f3;
        color: var(--accent-dark);
        padding: 0.2rem 0.6rem;
        border-radius: var(--radius-pill);
        font-size: 0.75rem;
        font-weight: 600;
        display: inline-block;
    }

    .pill.small { font-size: 0.7rem; }

    .table-card {
        background: var(--surface);
        border-radius: var(--radius);
        border: 1px solid var(--line);
        overflow: hidden;
    }

    .table-responsive {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        margin-top: 1rem;
        position: relative;
    }

    .table-scroll {
        max-height: 60vh;
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
    }

    .data-table th,
    .data-table td {
        padding: 12px 12px;
        text-align: left;
        border-top: 1px solid var(--line);
        vertical-align: top;
        font-size: 0.9rem;
        word-break: break-word;
    }

    .data-table thead th {
        background: var(--surface-2);
        border-top: none;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        position: sticky;
        top: 0;
        z-index: 2;
        box-shadow: 0 1px 0 var(--line);
    }

    .data-table tr:hover { background: #f9fcff; }

    .data-table.compact td { padding: 10px 10px; }

    .action-group {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
    }

    .form-title { font-weight: 700; color: var(--ink); }

    .form-table {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
    }

    .form-table .table-responsive {
        margin-top: 0;
    }

    .form-table .data-table th,
    .form-table .data-table td {
        border-top: 1px dashed var(--line);
    }

    .form-table .data-table tr:first-child td {
        border-top: none;
    }

    .form-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px dashed var(--line);
        align-items: center;
    }

    .form-row:last-child { border-bottom: none; }

    .form-label {
        font-weight: 600;
        color: var(--ink-soft);
        font-size: 0.9rem;
    }

    .form-input input,
    .form-input textarea,
    .form-input select {
        width: 100%;

    .response-card {
        background: #fff7e8;
        border: 1px solid #f1d6a8;
        border-radius: var(--radius);
        padding: 1rem;
        margin-top: 0.9rem;
    }

    .response-meta {
        font-weight: 600;
        font-size: 0.85rem;
        color: #9a6a1c;
        margin-bottom: 0.6rem;
    }

    .section-title {
        margin-top: 1.2rem;
        font-weight: 600;
        color: var(--ink-soft);
    }

    .date-group {
        margin-top: 1rem;
    }

    .date-title {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.5rem;
    }

    .login-screen {
        max-width: 460px;
        margin: 12vh auto;
    }

    footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.78rem;
        color: var(--muted);
    }

    .modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(10,20,30,0.35);
        backdrop-filter: blur(6px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: white;
        max-width: 650px;
        width: 92%;
        border-radius: var(--radius-lg);
        padding: 1.6rem;
        max-height: 85vh;
        overflow-y: auto;
    }

    .field-row {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        margin-bottom: 0.8rem;
        flex-wrap: wrap;
    }

    .field-row input { flex: 2; }
    .field-row select { flex: 1; }
    .field-row button { flex-shrink: 0; }

    .error-message {
        background: #ffe6e5;
        color: #b91c1c;
        padding: 1rem;
        border-radius: var(--radius);
        margin-bottom: 1rem;
    }

    .success-message {
        background: #e0f2e9;
        color: #166534;
        padding: 1rem;
        border-radius: var(--radius);
        margin-bottom: 1rem;
    }

    @media (max-width: 700px) {
        body {

        .card { padding: 1.2rem; border-radius: var(--radius); }
        h1 { font-size: 1.55rem; }
        input, textarea, select { font-size: 1rem; }
        .data-table th, .data-table td { padding: 14px 12px; font-size: 0.95rem; }
        .table-scroll { max-height: 55vh; }
        .header-actions {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, minmax(0,1fr));
            gap: 0.6rem;
        }
        .header-actions .btn-ghost,
        .header-actions .btn-outline {
            grid-column: 1 / -1;
        }
        .form-actions { justify-content: flex-start; }
        .form-row {
            grid-template-columns: 1fr;
            gap: 6px;
        }
        .toggle-switch .toggle-text { display: none; }
    }

    @media (hover: none) {
        .btn:hover,
        button:hover {
            transform: none;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
    }

    @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

    // ----------  ИНИЦИАЛИЗАЦИЯ ЛОКАЛЬНОГО ХРАНИЛИЩА ----------
    function initLocalStorage() {
        if (!localStorage.getItem(STORAGE_FORMS)) {
            localStorage.setItem(STORAGE_FORMS, JSON.stringify(DEFAULT_FORMS));
        }
        if (!localStorage.getItem(STORAGE_AVAILABILITY)) {
            const forms = JSON.parse(localStorage.getItem(STORAGE_FORMS));
            const avail = {};
            forms.forEach(f => { avail[f.id] = false; });
            localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        }
        if (!localStorage.getItem(STORAGE_RESPONSES)) {
            localStorage.setItem(STORAGE_RESPONSES, JSON.stringify([]));
        }
    }

    function getLocalForms() {
        return JSON.parse(localStorage.getItem(STORAGE_FORMS));
    }

    function setLocalForms(forms) {
        localStorage.setItem(STORAGE_FORMS, JSON.stringify(forms));
        formsCache = forms;
    }

    function getLocalAvailability() {
        return JSON.parse(localStorage.getItem(STORAGE_AVAILABILITY));
    }

    function setLocalAvailability(formId, isAvailable) {
        const avail = getLocalAvailability();
        avail[formId] = isAvailable;
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
    }

    function getLocalResponses() {
        return JSON.parse(localStorage.getItem(STORAGE_RESPONSES));
    }

    function addLocalResponse(formId, dataObj) {
        const responses = getLocalResponses();
        responses.push({
            form_id: formId,
            created_at: new Date().toISOString(),
            data: dataObj
        });
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(responses));
    }

    function clearLocalResponses() {
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify([]));
    }

    function clearLocalResponsesForForm(formId) {
        const responses = getLocalResponses();
        const newResponses = responses.filter(r => r.form_id !== formId);
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(newResponses));
    }

    function createLocalForm(name, description, fields, isTable) {
        const forms = getLocalForms();
        const newId = "form_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
        const newForm = {
            id: newId,
            name: name,
            description: description,
            fields: fields,
            is_table: isTable
        };
        forms.push(newForm);
        setLocalForms(forms);
        const avail = getLocalAvailability();
        avail[newId] = false;
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        return newForm;
    }

    function deleteLocalForm(formId) {
        let forms = getLocalForms();
        forms = forms.filter(f => f.id !== formId);
        setLocalForms(forms);
        const avail = getLocalAvailability();
        delete avail[formId];
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        clearLocalResponsesForForm(formId);
        return true;
    }
    // ----------  ФУНКЦИИ СИНХРОНИЗАЦИИ С SUPABASE ----------
    async function syncFormsFromCloud() {
        if (!cloudEnabled) return false;
        try {
            const { data, error } = await supabaseClient.from('forms').select('*');
            if (error) throw error;
            if (data && data.length > 0) {
                setLocalForms(data);
                // также синхронизируем доступность
                const { data: availData } = await supabaseClient.from('availability').select('*');
                if (availData) {
                    const newAvail = {};
                    availData.forEach(row => newAvail[row.form_id] = row.is_available);
                    localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(newAvail));
                }
                return true;
            }
        } catch (e) {
            console.warn("Ошибка синхронизации форм из облака:", e);
        }
        return false;
    }

    async function syncResponsesFromCloud() {
        if (!cloudEnabled) return;
        try {
            const { data, error } = await supabaseClient.from('responses').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            if (data) {
                localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(data));
            }
        } catch (e) {
            console.warn("Ошибка синхронизации ответов из облака:", e);
        }
    }

    async function pushFormToCloud(form) {
        if (!cloudEnabled) return;
        try {
            const { error } = await supabaseClient.from('forms').upsert(form);
            if (error) throw error;
        } catch (e) {
            console.warn("Не удалось отправить форму в облако:", e);
        }
    }

    async function pushAvailabilityToCloud(formId, isAvailable) {
        if (!cloudEnabled) return;
        try {
            await supabaseClient.from('availability').upsert({ form_id: formId, is_available: isAvailable });
        } catch (e) {
            console.warn("Не удалось отправить доступность в облако:", e);
        }
    }

    async function pushResponseToCloud(formId, dataObj) {
        if (!cloudEnabled) return;
        try {
            await supabaseClient.from('responses').insert({ form_id: formId, data: dataObj });
        } catch (e) {
            console.warn("Не удалось отправить ответ в облако:", e);
        }
    }

    async function deleteFormFromCloud(formId) {
        if (!cloudEnabled) return;
        try {
            await supabaseClient.from('forms').delete().eq('id', formId);
            await supabaseClient.from('responses').delete().eq('form_id', formId);
            await supabaseClient.from('availability').delete().eq('form_id', formId);
        } catch (e) {
            console.warn("Не удалось удалить форму в облаке:", e);
        }
    }

    async function clearAllResponsesCloud() {
        if (!cloudEnabled) return;
        try {
            await supabaseClient.from('responses').delete().neq('id', 0);
        } catch (e) {
            console.warn("Не удалось очистить ответы в облаке:", e);
        }
    }

    async function clearResponsesForFormCloud(formId) {
        if (!cloudEnabled) return;
        try {
            await supabaseClient.from('responses').delete().eq('form_id', formId);
        } catch (e) {
            console.warn("Не удалось очистить ответы формы в облаке:", e);
        }
    }

    // ----------  ИНИЦИАЛИЗАЦИЯ SUPABASE И ПОДПИСКИ ----------
    async function initSupabase() {
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await supabaseClient.from('forms').select('count', { head: true });
            cloudEnabled = true;
            console.log("Подключение к Supabase установлено");
            // Подписываемся на изменения
            const formsSub = supabaseClient.channel('forms-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'forms' }, async () => {
                    await syncFormsFromCloud();
                    if (currentRole === 'therapist') renderTherapist();
                    else if (currentRole === 'patient') renderPatient();
                })
                .subscribe();
            const availSub = supabaseClient.channel('avail-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'availability' }, async () => {
                    await syncFormsFromCloud();
                    if (currentRole === 'therapist') renderTherapist();
                    else if (currentRole === 'patient') renderPatient();
                })
                .subscribe();
            const respSub = supabaseClient.channel('resp-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'responses' }, async () => {
                    await syncResponsesFromCloud();
                    if (currentRole === 'therapist') renderTherapist();
                    else if (currentRole === 'patient') renderPatient();
                })
                .subscribe();
            return true;
        } catch (e) {
            console.warn("Supabase недоступен, работаем локально:", e);
            cloudEnabled = false;
            return false;
        }
    }

    function showSuccess(msg) {

        function renderResponsesTable(responses, form) {
        if (!responses.length) return '<p>Нет ответов.</p>';
        const fields = form.fields || [];
        const groups = {};
        const order = [];
        responses.forEach(resp => {
            const d = new Date(resp.created_at);
            const dateKey = d.toLocaleDateString('ru-RU');
            if (!groups[dateKey]) {
                groups[dateKey] = [];
                order.push(dateKey);
            }
            groups[dateKey].push(resp);
        });

        let html = '';
        if (form.is_table) {
            order.forEach(dateKey => {
                html += `<div class="date-group"><div class="date-title">${dateKey}</div>`;
                html += '<div class="table-responsive table-scroll"><table class="data-table"><thead><tr><th>Время</th>';
                fields.forEach(f => html += `<th>${f.label}</th>`);
                html += '</tr></thead><tbody>';
                groups[dateKey].forEach(resp => {
                    const time = new Date(resp.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    html += `<tr><td>${time}</td>`;
                    fields.forEach(f => {
                        let val = resp.data[f.name] || '';
                        html += `<td>${val}</td>`;
                    });
                    html += `</tr>`;
                });
                html += '</tbody></table></div></div>';
            });
            return html;
        }

        order.forEach(dateKey => {
            html += `<div class="date-group"><div class="date-title">${dateKey}</div>`;
            html += '<div class="table-responsive table-scroll"><table class="data-table"><thead><tr><th>Время</th><th>Поле</th><th>Значение</th></tr></thead><tbody>';
            groups[dateKey].forEach(resp => {
                const time = new Date(resp.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                let rowAdded = false;
                fields.forEach(f => {
                    let val = resp.data[f.name];
                    if (val) {
                        rowAdded = true;
                        html += `<tr><td>${time}</td><td>${f.label}</td><td>${val}</td></tr>`;
                    }
                });
                if (!rowAdded) {
                    html += `<tr><td>${time}</td><td>—</td><td>Нет данных</td></tr>`;
                }
            });
            html += '</tbody></table></div></div>';
        });
        return html;
    }

                const responses = getLocalResponses();
                const formResponses = responses.filter(r => r.form_id === form.id);
                const historyDiv = formCard.querySelector(`#history-${form.id}`);
                if (formResponses.length === 0) {
                    historyDiv.innerHTML = '<p>Пока нет записей.</p>';
                    return;
                }
                historyDiv.innerHTML = renderResponsesTable(formResponses, form);
            }
            loadHistory();

            const saveBtn = formCard.querySelector('.save-btn');
            saveBtn.addEventListener('click', async () => {
                const formData = {};
                fields.forEach(field => {
                    const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                    if (input) formData[field.name] = input.value;
                });
                if (Object.values(formData).every(v => !v || v.trim() === '')) {
                    alert('Заполните хотя бы одно поле.');
                    return;
                }
                addLocalResponse(form.id, formData);
                await pushResponseToCloud(form.id, formData);
                fields.forEach(field => {
                    const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                    if (input) input.value = '';
                });
                showSuccess('Ответ сохранён!');
                loadHistory();
            });
        }

        document.getElementById('logoutBtnPatient').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
    }

    // ----------  ВХОД ----------
    function renderLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="login-screen card">
                <h1 style="text-align:center;">🧠 Психотерапия и заполнение рабочих листов</h1>
                <p style="text-align:center; margin:1rem 0 2rem;">Введите код доступа</p>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Код</label>
                        <input type="password" id="accessCode" placeholder="••••" autocomplete="off">
                    </div>
                    <div class="form-actions">
                        <button id="loginBtn">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const code = document.getElementById('accessCode').value.trim();
            if (code === '1113') {
                currentRole = 'therapist';
                sessionStorage.setItem('therapyRole', 'therapist');
                await syncFormsFromCloud();
                await syncResponsesFromCloud();
                renderTherapist();
            } else if (code === '1') {
                currentRole = 'patient';
                sessionStorage.setItem('therapyRole', 'patient');
                await syncFormsFromCloud();
                await syncResponsesFromCloud();
                renderPatient();
            } else {
                alert('Неверный код');
            }
        });
    }

    // ----------  ЗАПУСК ----------
    (async () => {
        initLocalStorage();
        await initSupabase();   // пробуем подключиться к Supabase, но даже если нет – работаем локально
        const savedRole = sessionStorage.getItem('therapyRole');
        if (savedRole === 'therapist') {
            currentRole = 'therapist';
            await syncFormsFromCloud();
            await syncResponsesFromCloud();
            renderTherapist();
        } else if (savedRole === 'patient') {
            currentRole = 'patient';
            await syncFormsFromCloud();
            await syncResponsesFromCloud();
            renderPatient();
        } else {
            renderLogin();
        }
    })();


</script>
</body>
</html>

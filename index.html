<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Психотерапия и рабочие листы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #eef2f9 0%, #d9e2ef 100%);
            color: #1a2c3e;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f4e7a, #3b82b6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #0f3b5c;
            border-left: 5px solid #3b82b6;
            padding-left: 1rem;
        }
        button {
            background: #3b82b6;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #1f5e8c;
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3b82b6;
            color: #1f5e8c;
        }
        .btn-outline:hover {
            background: #eef4ff;
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #2c4f6e;
        }
        input, textarea, select {
            padding: 12px 16px;
            border: 1px solid #cbdde9;
            border-radius: 24px;
            font-family: inherit;
            font-size: 0.95rem;
            background: #fff;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .toggle-switch input {
            width: 44px;
            height: 24px;
            appearance: none;
            background: #cbd5e1;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch input:checked {
            background: #3b82b6;
        }
        .toggle-switch input::before {
            content: '';
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle-switch input:checked::before {
            left: 22px;
        }
        .form-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .form-item {
            background: #ffffffea;
            border-radius: 28px;
            padding: 1.2rem;
            border: 1px solid #e2edf5;
            margin-bottom: 1rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .badge {
            background: #e2edf5;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1f5e8c;
        }
        .submissions {
            background: #fef9e6;
            border-left: 5px solid #eab308;
            margin-top: 0.8rem;
            padding: 0.9rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .login-screen {
            max-width: 460px;
            margin: 12vh auto;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #4b6f8e;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 650px;
            width: 90%;
            border-radius: 40px;
            padding: 1.8rem;
            max-height: 85vh;
            overflow-y: auto;
        }
        .field-row {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .field-row input { flex: 2; }
        .field-row select { flex: 1; }
        .field-row button { flex-shrink: 0; }
        .table-responsive {
            overflow-x: auto;
            margin-top: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 12px;
            text-align: left;
            border-bottom: 1px solid #e9f0f5;
        }
        th {
            background: #f4f9fe;
            font-weight: 600;
            color: #1f4e7a;
        }
        @media (max-width: 700px) {
            .card { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<script>
    // ----------  ЛОКАЛЬНАЯ БАЗА ДАННЫХ (localStorage) ----------
    const STORAGE_FORMS = "therapy_forms";
    const STORAGE_AVAILABILITY = "therapy_availability";
    const STORAGE_RESPONSES = "therapy_responses";

    let currentRole = null;
    let formsCache = [];

    // Инициализация данных по умолчанию, если пусто
    function initLocalStorage() {
        if (!localStorage.getItem(STORAGE_FORMS)) {
            // создадим одну демо-форму для примера
            const demoForm = {
                id: "demo_1",
                name: "1 сессия — Дневник гнева",
                description: "Записывайте эпизоды гнева и уверенность в правоте",
                fields: [
                    { name: "date", label: "Дата и время", type: "text" },
                    { name: "trigger", label: "Что произошло?", type: "textarea" },
                    { name: "certainty", label: "Уверенность (0-100)", type: "number" },
                    { name: "action", label: "Что сделал?", type: "textarea" },
                    { name: "later", label: "Что понял позже?", type: "textarea" }
                ],
                is_table: true
            };
            localStorage.setItem(STORAGE_FORMS, JSON.stringify([demoForm]));
        }
        if (!localStorage.getItem(STORAGE_AVAILABILITY)) {
            const forms = JSON.parse(localStorage.getItem(STORAGE_FORMS));
            const avail = {};
            forms.forEach(f => { avail[f.id] = false; });
            localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        }
        if (!localStorage.getItem(STORAGE_RESPONSES)) {
            localStorage.setItem(STORAGE_RESPONSES, JSON.stringify([]));
        }
    }

    function getForms() {
        return JSON.parse(localStorage.getItem(STORAGE_FORMS));
    }

    function saveForms(forms) {
        localStorage.setItem(STORAGE_FORMS, JSON.stringify(forms));
        formsCache = forms;
    }

    function getAvailability() {
        return JSON.parse(localStorage.getItem(STORAGE_AVAILABILITY));
    }

    function setAvailability(formId, isAvailable) {
        const avail = getAvailability();
        avail[formId] = isAvailable;
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
    }

    function getResponses() {
        return JSON.parse(localStorage.getItem(STORAGE_RESPONSES));
    }

    function addResponse(formId, dataObj) {
        const responses = getResponses();
        responses.push({
            form_id: formId,
            created_at: new Date().toISOString(),
            data: dataObj
        });
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(responses));
    }

    function clearAllResponses() {
        if (confirm("Удалить ВСЕ ответы пациента?")) {
            localStorage.setItem(STORAGE_RESPONSES, JSON.stringify([]));
            return true;
        }
        return false;
    }

    function clearResponsesForForm(formId) {
        const responses = getResponses();
        const newResponses = responses.filter(r => r.form_id !== formId);
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(newResponses));
    }

    function createForm(name, description, fields, isTable) {
        const forms = getForms();
        const newId = "form_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
        const newForm = {
            id: newId,
            name: name,
            description: description,
            fields: fields,
            is_table: isTable
        };
        forms.push(newForm);
        saveForms(forms);
        // также добавить в availability
        const avail = getAvailability();
        avail[newId] = false;
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        return true;
    }

    function deleteForm(formId) {
        let forms = getForms();
        forms = forms.filter(f => f.id !== formId);
        saveForms(forms);
        // удалить из availability
        const avail = getAvailability();
        delete avail[formId];
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        // удалить ответы
        clearResponsesForForm(formId);
        return true;
    }

    // Вспомогательные функции отображения
    function showError(msg) {
        const app = document.getElementById('app');
        const div = document.createElement('div');
        div.className = 'error-message';
        div.style.background = '#ffe6e5';
        div.style.color = '#b91c1c';
        div.style.padding = '1rem';
        div.style.borderRadius = '28px';
        div.style.marginBottom = '1rem';
        div.innerText = '⚠️ ' + msg;
        app.prepend(div);
        setTimeout(() => div.remove(), 5000);
    }

    function showSuccess(msg) {
        const app = document.getElementById('app');
        const div = document.createElement('div');
        div.className = 'success-message';
        div.style.background = '#e0f2e9';
        div.style.color = '#166534';
        div.style.padding = '1rem';
        div.style.borderRadius = '28px';
        div.style.marginBottom = '1rem';
        div.innerText = '✅ ' + msg;
        app.prepend(div);
        setTimeout(() => div.remove(), 3000);
    }

    // Рендер таблицы ответов
    function renderResponsesTable(responses, form) {
        if (!responses.length) return '<p>Нет ответов.</p>';
        const fields = form.fields || [];
        if (form.is_table) {
            let html = '<div class="table-responsive"><table><thead><tr><th>📅 Дата</th>';
            fields.forEach(f => html += `<th>${f.label}</th>`);
            html += '</tr></thead><tbody>';
            responses.forEach(resp => {
                html += `<tr><td>${new Date(resp.created_at).toLocaleString()}</td>`;
                fields.forEach(f => {
                    let val = resp.data[f.name] || '';
                    html += `<td>${val}</td>`;
                });
                html += `</tr>`;
            });
            html += '</tbody></table></div>';
            return html;
        } else {
            let html = '';
            responses.forEach(resp => {
                html += `<div class="submissions"><strong>${new Date(resp.created_at).toLocaleString()}</strong><br>`;
                fields.forEach(f => {
                    let val = resp.data[f.name];
                    if (val) html += `<span style="font-weight:500">${f.label}:</span> ${val}<br>`;
                });
                html += `</div>`;
            });
            return html;
        }
    }

    // ---- Панель терапевта ----
    function renderTherapist() {
        const app = document.getElementById('app');
        const forms = getForms();
        formsCache = forms;
        const availability = getAvailability();
        app.innerHTML = `
            <div class="header">
                <h1>🧑‍⚕️ Психотерапия и заполнение рабочих листов</h1>
                <div>
                    <button id="clearAllBtn" style="background:#d97706;">🧹 Очистить всё</button>
                    <button id="createFormBtn" style="margin-left:0.5rem;">➕ Создать форму</button>
                    <button id="logoutBtn" class="btn-outline" style="margin-left:0.5rem;">Выйти</button>
                </div>
            </div>
            <div class="card">
                <h2>📋 Управление формами</h2>
                <div id="formsList"></div>
            </div>
            <div class="card">
                <h2>📥 Все ответы пациента</h2>
                <div id="responsesViewer">Загрузка...</div>
            </div>
            <footer>Названия форм рекомендуется начинать с номера сессии: "1 сессия — Дневник гнева"</footer>
        `;

        const formsContainer = document.getElementById('formsList');
        formsContainer.innerHTML = '';
        for (let form of forms) {
            const isAvail = availability[form.id] || false;
            const div = document.createElement('div');
            div.className = 'form-item';
            div.innerHTML = `
                <div class="flex-between">
                    <div><strong>${form.name}</strong> <span class="badge">${form.is_table ? '📊 Таблица' : '📄 Анкета'}</span></div>
                    <div style="display: flex; gap: 0.5rem;">
                        <div class="toggle-switch">
                            <span>Доступна</span>
                            <input type="checkbox" data-id="${form.id}" ${isAvail ? 'checked' : ''}>
                        </div>
                        <button class="clear-form" data-id="${form.id}" style="background:#d97706; padding:4px 12px;">🧹 Очистить ответы</button>
                        <button class="delete-form" data-id="${form.id}" style="background:#b91c1c; padding:4px 12px;">🗑️</button>
                    </div>
                </div>
                <p style="font-size:0.8rem; margin-top:8px;">${form.description || ''}</p>
            `;
            formsContainer.appendChild(div);
            const chk = div.querySelector('input[type="checkbox"]');
            chk.addEventListener('change', (e) => {
                setAvailability(form.id, e.target.checked);
            });
            const clearBtn = div.querySelector('.clear-form');
            clearBtn.addEventListener('click', () => {
                clearResponsesForForm(form.id);
                updateResponsesView();
                showSuccess(`Ответы по форме "${form.name}" удалены`);
            });
            const delBtn = div.querySelector('.delete-form');
            delBtn.addEventListener('click', () => {
                if (confirm(`Удалить форму "${form.name}" и все её ответы?`)) {
                    deleteForm(form.id);
                    renderTherapist();
                }
            });
        }

        function updateResponsesView() {
            const responses = getResponses();
            const container = document.getElementById('responsesViewer');
            if (!container) return;
            if (responses.length === 0) {
                container.innerHTML = '<p>Нет ответов.</p>';
                return;
            }
            let html = '';
            for (let form of forms) {
                const formResponses = responses.filter(r => r.form_id === form.id);
                if (formResponses.length === 0) continue;
                html += `<div style="margin-bottom:2rem;"><h3>📄 ${form.name}</h3>`;
                html += renderResponsesTable(formResponses, form);
                html += `</div>`;
            }
            if (html === '') html = '<p>Нет ответов.</p>';
            container.innerHTML = html;
        }
        updateResponsesView();

        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (clearAllResponses()) {
                updateResponsesView();
                showSuccess("Все ответы удалены");
            }
        });
        document.getElementById('createFormBtn').addEventListener('click', () => showCreateFormModal());
    }

    // Модальное окно создания формы
    function showCreateFormModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>➕ Создать новую форму</h3>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Название (с номером сессии)</label>
                        <input id="formName" placeholder="1 сессия — Дневник гнева">
                    </div>
                    <div class="field-group">
                        <label>Описание</label>
                        <textarea id="formDesc" rows="2"></textarea>
                    </div>
                    <div class="field-group">
                        <label>Тип формы</label>
                        <select id="formType">
                            <option value="false">📄 Анкета (отдельные записи)</option>
                            <option value="true">📊 Таблица (дневник)</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Поля</label>
                        <div id="fieldsList"></div>
                        <button type="button" id="addFieldBtn" class="btn-outline" style="margin-top:0.5rem;">+ Добавить поле</button>
                    </div>
                    <div class="form-actions">
                        <button id="saveFormBtn">Создать</button>
                        <button id="cancelModalBtn" class="btn-outline">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        let fields = [];

        function renderFields() {
            const container = document.getElementById('fieldsList');
            container.innerHTML = '';
            fields.forEach((f, idx) => {
                const div = document.createElement('div');
                div.className = 'field-row';
                div.innerHTML = `
                    <input type="text" placeholder="Имя поля (латиницей)" value="${f.name}">
                    <input type="text" placeholder="Метка (отображаемый текст)" value="${f.label}">
                    <select>
                        <option value="text" ${f.type === 'text' ? 'selected' : ''}>Текст</option>
                        <option value="textarea" ${f.type === 'textarea' ? 'selected' : ''}>Многострочный</option>
                        <option value="number" ${f.type === 'number' ? 'selected' : ''}>Число</option>
                    </select>
                    <button class="remove-field" data-idx="${idx}" style="background:#b91c1c; padding:4px 10px;">✖️</button>
                `;
                container.appendChild(div);
                const nameInp = div.querySelector('input:first-child');
                const labelInp = div.querySelector('input:nth-child(2)');
                const typeSel = div.querySelector('select');
                nameInp.addEventListener('input', (e) => fields[idx].name = e.target.value);
                labelInp.addEventListener('input', (e) => fields[idx].label = e.target.value);
                typeSel.addEventListener('change', (e) => fields[idx].type = e.target.value);
                div.querySelector('.remove-field').addEventListener('click', () => {
                    fields.splice(idx, 1);
                    renderFields();
                });
            });
        }

        document.getElementById('addFieldBtn').addEventListener('click', () => {
            fields.push({ name: 'field' + (fields.length+1), label: 'Новое поле', type: 'text' });
            renderFields();
        });

        document.getElementById('saveFormBtn').addEventListener('click', () => {
            const name = document.getElementById('formName').value.trim();
            const desc = document.getElementById('formDesc').value;
            const isTable = document.getElementById('formType').value === 'true';
            if (!name) { alert('Введите название'); return; }
            if (fields.length === 0) { alert('Добавьте хотя бы одно поле'); return; }
            const namesSet = new Set();
            for (let f of fields) {
                if (!f.name || !f.label) { alert('Заполните имя и метку поля'); return; }
                if (namesSet.has(f.name)) { alert(`Поле с именем "${f.name}" повторяется`); return; }
                namesSet.add(f.name);
            }
            createForm(name, desc, fields, isTable);
            modal.remove();
            renderTherapist();
            showSuccess(`Форма "${name}" создана`);
        });
        document.getElementById('cancelModalBtn').addEventListener('click', () => modal.remove());
        renderFields();
    }

    // ---- Пациент ----
    function renderPatient() {
        const app = document.getElementById('app');
        const forms = getForms();
        const availability = getAvailability();
        const availableForms = forms.filter(f => availability[f.id] === true);
        app.innerHTML = `
            <div class="header">
                <h1>📝 Психотерапия и заполнение рабочих листов</h1>
                <button id="logoutBtnPatient" class="btn-outline">Выйти</button>
            </div>
            <div class="card">
                <div id="patientFormsContainer"></div>
            </div>
            <footer>Данные сохраняются в браузере. Формы открываются терапевтом.</footer>
        `;
        const container = document.getElementById('patientFormsContainer');
        if (availableForms.length === 0) {
            container.innerHTML = '<p>⏳ Нет доступных форм. Терапевт откроет их позже.</p>';
            document.getElementById('logoutBtnPatient').addEventListener('click', () => {
                currentRole = null;
                sessionStorage.removeItem('therapyRole');
                renderLogin();
            });
            return;
        }

        for (let form of availableForms) {
            const formCard = document.createElement('div');
            formCard.className = 'form-item';
            formCard.innerHTML = `
                <h3>${form.is_table ? '📊' : '📄'} ${form.name}</h3>
                <p style="font-size:0.85rem; margin-bottom:1rem;">${form.description || ''}</p>
                <div id="form-${form.id}" class="form-grid"></div>
                <div class="form-actions"><button class="save-btn" data-id="${form.id}">💾 Сохранить ответ</button></div>
                <div style="margin-top:1.5rem; font-weight:500;">📅 Мои предыдущие записи:</div>
                <div id="history-${form.id}"></div>
            `;
            container.appendChild(formCard);
            const fieldsContainer = formCard.querySelector(`#form-${form.id}`);
            const fields = form.fields || [];
            fields.forEach(field => {
                const div = document.createElement('div');
                div.className = 'field-group';
                div.innerHTML = `<label>${field.label}</label>
                                 <${field.type === 'textarea' ? 'textarea' : 'input'} 
                                    data-field="${field.name}" 
                                    ${field.type !== 'textarea' ? `type="${field.type}"` : ''}
                                    placeholder="${field.placeholder || ''}"></${field.type === 'textarea' ? 'textarea' : 'input'}>`;
                fieldsContainer.appendChild(div);
            });

            function loadHistory() {
                const responses = getResponses();
                const formResponses = responses.filter(r => r.form_id === form.id);
                const historyDiv = formCard.querySelector(`#history-${form.id}`);
                if (formResponses.length === 0) {
                    historyDiv.innerHTML = '<p>Пока нет записей.</p>';
                    return;
                }
                if (form.is_table) {
                    let html = '<div class="table-responsive"><table><thead><tr><th>📅 Дата</th>';
                    form.fields.forEach(f => html += `<th>${f.label}</th>`);
                    html += '</tr></thead><tbody>';
                    formResponses.forEach(resp => {
                        html += `<tr><td>${new Date(resp.created_at).toLocaleString()}</td>`;
                        form.fields.forEach(f => {
                            let val = resp.data[f.name] || '';
                            html += `<td>${val}</td>`;
                        });
                        html += `</tr>`;
                    });
                    html += '</tbody></table></div>';
                    historyDiv.innerHTML = html;
                } else {
                    let html = '';
                    formResponses.forEach(resp => {
                        html += `<div class="submissions"><strong>${new Date(resp.created_at).toLocaleString()}</strong><br>`;
                        form.fields.forEach(f => {
                            let val = resp.data[f.name];
                            if (val) html += `<span style="font-weight:500">${f.label}:</span> ${val}<br>`;
                        });
                        html += `</div>`;
                    });
                    historyDiv.innerHTML = html;
                }
            }
            loadHistory();

            const saveBtn = formCard.querySelector('.save-btn');
            saveBtn.addEventListener('click', () => {
                const formData = {};
                fields.forEach(field => {
                    const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                    if (input) formData[field.name] = input.value;
                });
                if (Object.values(formData).every(v => !v || v.trim() === '')) {
                    alert('Заполните хотя бы одно поле.');
                    return;
                }
                addResponse(form.id, formData);
                fields.forEach(field => {
                    const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                    if (input) input.value = '';
                });
                showSuccess('Ответ сохранён!');
                loadHistory();
            });
        }

        document.getElementById('logoutBtnPatient').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
    }

    // ---- Вход ----
    function renderLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="login-screen card">
                <h1 style="text-align:center;">🧠 Психотерапия и заполнение рабочих листов</h1>
                <p style="text-align:center; margin:1rem 0 2rem;">Введите код доступа</p>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Код</label>
                        <input type="password" id="accessCode" placeholder="••••" autocomplete="off">
                    </div>
                    <div class="form-actions">
                        <button id="loginBtn">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', () => {
            const code = document.getElementById('accessCode').value.trim();
            if (code === '1113') {
                currentRole = 'therapist';
                sessionStorage.setItem('therapyRole', 'therapist');
                renderTherapist();
            } else if (code === '1') {
                currentRole = 'patient';
                sessionStorage.setItem('therapyRole', 'patient');
                renderPatient();
            } else {
                alert('Неверный код');
            }
        });
    }

    // ---- Запуск ----
    initLocalStorage();
    const savedRole = sessionStorage.getItem('therapyRole');
    if (savedRole === 'therapist') {
        currentRole = 'therapist';
        renderTherapist();
    } else if (savedRole === 'patient') {
        currentRole = 'patient';
        renderPatient();
    } else {
        renderLogin();
    }
</script>
</body>
</html>

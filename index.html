    // ----------  ИНИЦИАЛИЗАЦИЯ ЛОКАЛЬНОГО ХРАНИЛИЩА ----------
    function initLocalStorage() {
        if (!localStorage.getItem(STORAGE_FORMS)) {
            localStorage.setItem(STORAGE_FORMS, JSON.stringify(DEFAULT_FORMS));
        }
        if (!localStorage.getItem(STORAGE_AVAILABILITY)) {
            const forms = JSON.parse(localStorage.getItem(STORAGE_FORMS));
            const avail = {};
            forms.forEach(f => { avail[f.id] = false; });
            localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        }
        if (!localStorage.getItem(STORAGE_RESPONSES)) {
            localStorage.setItem(STORAGE_RESPONSES, JSON.stringify([]));
        }
    }

    function getLocalForms() {
        return JSON.parse(localStorage.getItem(STORAGE_FORMS));
    }

    function setLocalForms(forms) {
        localStorage.setItem(STORAGE_FORMS, JSON.stringify(forms));
        formsCache = forms;
    }

    function getLocalAvailability() {
        return JSON.parse(localStorage.getItem(STORAGE_AVAILABILITY));
    }

    function setLocalAvailability(formId, isAvailable) {
        const avail = getLocalAvailability();
        avail[formId] = isAvailable;
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
    }

    function getLocalResponses() {
        return JSON.parse(localStorage.getItem(STORAGE_RESPONSES));
    }

    function addLocalResponse(formId, dataObj) {
        const responses = getLocalResponses();
        responses.push({
            form_id: formId,
            created_at: new Date().toISOString(),
            data: dataObj
        });
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(responses));
    }

    function clearLocalResponses() {
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify([]));
    }

    function clearLocalResponsesForForm(formId) {
        const responses = getLocalResponses();
        const newResponses = responses.filter(r => r.form_id !== formId);
        localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(newResponses));
    }

    function createLocalForm(name, description, fields, isTable) {
        const forms = getLocalForms();
        const newId = "form_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
        const newForm = {
            id: newId,
            name: name,
            description: description,
            fields: fields,
            is_table: isTable
        };
        forms.push(newForm);
        setLocalForms(forms);
        const avail = getLocalAvailability();
        avail[newId] = false;
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        return newForm;
    }

    function deleteLocalForm(formId) {
        let forms = getLocalForms();
        forms = forms.filter(f => f.id !== formId);
        setLocalForms(forms);
        const avail = getLocalAvailability();
        delete avail[formId];
        localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(avail));
        clearLocalResponsesForForm(formId);
        return true;
    }

    // ----------  ФУНКЦИИ СИНХРОНИЗАЦИИ С SUPABASE ----------
    async function syncFormsFromCloud() {
        if (!cloudEnabled) return false;
        try {
            const { data, error } = await supabase.from('forms').select('*');
            if (error) throw error;
            if (data && data.length > 0) {
                setLocalForms(data);
                // также синхронизируем доступность
                const { data: availData } = await supabase.from('availability').select('*');
                if (availData) {
                    const newAvail = {};
                    availData.forEach(row => newAvail[row.form_id] = row.is_available);
                    localStorage.setItem(STORAGE_AVAILABILITY, JSON.stringify(newAvail));
                }
                return true;
            }
        } catch (e) {
            console.warn("Ошибка синхронизации форм из облака:", e);
        }
        return false;
    }

    async function syncResponsesFromCloud() {
        if (!cloudEnabled) return;
        try {
            const { data, error } = await supabase.from('responses').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            if (data) {
                localStorage.setItem(STORAGE_RESPONSES, JSON.stringify(data));
            }
        } catch (e) {
            console.warn("Ошибка синхронизации ответов из облака:", e);
        }
    }

    async function pushFormToCloud(form) {
        if (!cloudEnabled) return;
        try {
            const { error } = await supabase.from('forms').upsert(form);
            if (error) throw error;
        } catch (e) {
            console.warn("Не удалось отправить форму в облако:", e);
        }
    }

    async function pushAvailabilityToCloud(formId, isAvailable) {
        if (!cloudEnabled) return;
        try {
            await supabase.from('availability').upsert({ form_id: formId, is_available: isAvailable });
        } catch (e) {
            console.warn("Не удалось отправить доступность в облако:", e);
        }
    }

    async function pushResponseToCloud(formId, dataObj) {
        if (!cloudEnabled) return;
        try {
            await supabase.from('responses').insert({ form_id: formId, data: dataObj });
        } catch (e) {
            console.warn("Не удалось отправить ответ в облако:", e);
        }
    }

    async function deleteFormFromCloud(formId) {
        if (!cloudEnabled) return;
        try {
            await supabase.from('forms').delete().eq('id', formId);
            await supabase.from('responses').delete().eq('form_id', formId);
            await supabase.from('availability').delete().eq('form_id', formId);
        } catch (e) {
            console.warn("Не удалось удалить форму в облаке:", e);
        }
    }

    async function clearAllResponsesCloud() {
        if (!cloudEnabled) return;
        try {
            await supabase.from('responses').delete().neq('id', 0);

            console.warn("Не удалось очистить ответы в облаке:", e);

            await supabase.from('responses').delete().eq('form_id', formId);
        } catch (e) {
            console.warn("Не удалось очистить ответы формы в облаке:", e);
        }
    }

    // ----------  ИНИЦИАЛИЗАЦИЯ SUPABASE И ПОДПИСКИ ----------
    async function initSupabase() {
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await supabase.from('forms').select('count', { head: true });
            cloudEnabled = true;
            console.log("Подключение к Supabase установлено");
            // Подписываемся на изменения
            const formsSub = supabase.channel('forms-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'forms' }, async () => {
                    await syncFormsFromCloud();
                    if (currentRole === 'therapist') renderTherapist();
                    else if (currentRole === 'patient') renderPatient();
                })
                .subscribe();
            const availSub = supabase.channel('avail-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'availability' }, async () => {
                    await syncFormsFromCloud();
                    if (currentRole === 'therapist') renderTherapist();
                    else if (currentRole === 'patient') renderPatient();
                })
                .subscribe();
            const respSub = supabase.channel('resp-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'responses' }, async () => {
                    await syncResponsesFromCloud();
                    if (currentRole === 'therapist') renderTherapist();
                    else if (currentRole === 'patient') renderPatient();
                })
                .subscribe();
            return true;
        } catch (e) {
            console.warn("Supabase недоступен, работаем локально:", e);
            cloudEnabled = false;
            return false;
        }
    }

    // ----------  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ UI ----------
    function showError(msg) {
        const app = document.getElementById('app');
        const div = document.createElement('div');
        div.className = 'error-message';
        div.innerText = '⚠️ ' + msg;
        app.prepend(div);
        setTimeout(() => div.remove(), 5000);
        console.error(msg);
    }

    function showSuccess(msg) {
        const app = document.getElementById('app');
        const div = document.createElement('div');
        div.className = 'success-message';
        div.innerText = '✅ ' + msg;
        app.prepend(div);
        setTimeout(() => div.remove(), 3000);
    }

    function renderResponsesTable(responses, form) {
        if (!responses.length) return '<p>Нет ответов.</p>';
        const fields = form.fields || [];
        if (form.is_table) {
            let html = '<div class="table-responsive"> <table> <thead> <tr> <th>📅 Дата</th>';
            fields.forEach(f => html += `<th>${f.label}</th>`);
            html += '</tr> </thead> <tbody>';
            responses.forEach(resp => {
                html += `<tr> <td>${new Date(resp.created_at).toLocaleString()}</td>`;
                fields.forEach(f => {
                    let val = resp.data[f.name] || '';
                    html += `<td>${val}</td>`;
                });
                html += `</tr>`;
            });
            html += '</tbody> </table> </div>';
            return html;
        } else {
            let html = '';
            responses.forEach(resp => {
                html += `<div class="submissions"><strong>${new Date(resp.created_at).toLocaleString()}</strong><br>`;
                fields.forEach(f => {
                    let val = resp.data[f.name];
                    if (val) html += `<span style="font-weight:500">${f.label}:</span> ${val}<br>`;
                });
                html += `</div>`;
            });
            return html;
        }
    }

    // ----------  РЕНДЕР ТЕРАПЕВТА ----------
    async function renderTherapist() {
        const forms = getLocalForms();
        formsCache = forms;
        const availability = getLocalAvailability();
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="header">
                <h1>🧑‍⚕️ Психотерапия и заполнение рабочих листов</h1>
                <div>
                    <button id="clearAllBtn" style="background:#d97706;">🧹 Очистить всё</button>
                    <button id="createFormBtn" style="margin-left:0.5rem;">➕ Создать форму</button>
                    <button id="logoutBtn" class="btn-outline" style="margin-left:0.5rem;">Выйти</button>
                </div>
            </div>
            <div class="card">
                <h2>📋 Управление формами</h2>
                <div id="formsList"></div>
            </div>
            <div class="card">
                <h2>📥 Все ответы пациента</h2>
                <div id="responsesViewer">Загрузка...</div>
            </div>
            <footer>${cloudEnabled ? '☁️ Синхронизация с облаком включена' : '📀 Локальный режим (без облака)'}</footer>
        `;

        const formsContainer = document.getElementById('formsList');
        formsContainer.innerHTML = '';
        for (let form of forms) {
            const isAvail = availability[form.id] || false;
            const div = document.createElement('div');
            div.className = 'form-item';
            div.innerHTML = `
                <div class="flex-between">
                    <div><strong>${form.name}</strong> <span class="badge">${form.is_table ? '📊 Таблица' : '📄 Анкета'}</span></div>
                    <div style="display: flex; gap: 0.5rem;">
                        <div class="toggle-switch">
                            <span>Доступна</span>
                            <input type="checkbox" data-id="${form.id}" ${isAvail ? 'checked' : ''}>
                        </div>
                        <button class="clear-form" data-id="${form.id}" style="background:#d97706; padding:4px 12px;">🧹 Очистить ответы</button>
                        <button class="delete-form" data-id="${form.id}" style="background:#b91c1c; padding:4px 12px;">🗑️</button>
                    </div>
                </div>
                <p style="font-size:0.8rem; margin-top:8px;">${form.description || ''}</p>
            `;
            formsContainer.appendChild(div);
            const chk = div.querySelector('input[type="checkbox"]');
            chk.addEventListener('change', async (e) => {
                setLocalAvailability(form.id, e.target.checked);
                await pushAvailabilityToCloud(form.id, e.target.checked);
            });
            const clearBtn = div.querySelector('.clear-form');
            clearBtn.addEventListener('click', async () => {
                clearLocalResponsesForForm(form.id);
                await clearResponsesForFormCloud(form.id);
                updateResponsesView();
                showSuccess(`Ответы по форме "${form.name}" удалены`);
            });
            const delBtn = div.querySelector('.delete-form');
            delBtn.addEventListener('click', async () => {
                if (confirm(`Удалить форму "${form.name}" и все её ответы?`)) {
                    deleteLocalForm(form.id);
                    await deleteFormFromCloud(form.id);
                    renderTherapist();
                }
            });
        }

        async function updateResponsesView() {
            const responses = getLocalResponses();
            const container = document.getElementById('responsesViewer');
            if (!container) return;
            if (responses.length === 0) {
                container.innerHTML = '<p>Нет ответов.</p>';
                return;
            }
            let html = '';
            for (let form of forms) {
                const formResponses = responses.filter(r => r.form_id === form.id);
                if (formResponses.length === 0) continue;
                html += `<div style="margin-bottom:2rem;"><h3>📄 ${form.name}</h3>`;
                html += renderResponsesTable(formResponses, form);
                html += `</div>`;
            }
            if (html === '') html = '<p>Нет ответов.</p>';
            container.innerHTML = html;
        }
        await updateResponsesView();

        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
        document.getElementById('clearAllBtn').addEventListener('click', async () => {
            if (confirm("Удалить ВСЕ ответы пациента?")) {
                clearLocalResponses();
                await clearAllResponsesCloud();
                updateResponsesView();
                showSuccess("Все ответы удалены");
            }
        });
        document.getElementById('createFormBtn').addEventListener('click', () => showCreateFormModal());
    }

    // ----------  МОДАЛЬНОЕ ОКНО СОЗДАНИЯ ФОРМЫ ----------
    function showCreateFormModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>➕ Создать новую форму</h3>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Название (с номером сессии)</label>
                        <input id="formName" placeholder="16 сессия — Название">
                    </div>
                    <div class="field-group">
                        <label>Описание</label>
                        <textarea id="formDesc" rows="2"></textarea>
                    </div>
                    <div class="field-group">
                        <label>Тип формы</label>
                        <select id="formType">
                            <option value="false">📄 Анкета (отдельные записи)</option>
                            <option value="true">📊 Таблица (дневник)</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Поля</label>
                        <div id="fieldsList"></div>
                        <button type="button" id="addFieldBtn" class="btn-outline" style="margin-top:0.5rem;">+ Добавить поле</button>
                    </div>
                    <div class="form-actions">
                        <button id="saveFormBtn">Создать</button>
                        <button id="cancelModalBtn" class="btn-outline">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        let fields = [];

        function renderFields() {
            const container = document.getElementById('fieldsList');
            container.innerHTML = '';
            fields.forEach((f, idx) => {
                const div = document.createElement('div');
                div.className = 'field-row';
                div.innerHTML = `
                    <input type="text" placeholder="Имя поля (латиницей)" value="${f.name}">
                    <input type="text" placeholder="Метка (отображаемый текст)" value="${f.label}">
                    <select>
                        <option value="text" ${f.type === 'text' ? 'selected' : ''}>Текст</option>
                        <option value="textarea" ${f.type === 'textarea' ? 'selected' : ''}>Многострочный</option>
                        <option value="number" ${f.type === 'number' ? 'selected' : ''}>Число</option>
                    </select>
                    <button class="remove-field" data-idx="${idx}" style="background:#b91c1c; padding:4px 10px;">✖️</button>
                `;
                container.appendChild(div);
                const nameInp = div.querySelector('input:first-child');
                const labelInp = div.querySelector('input:nth-child(2)');
                const typeSel = div.querySelector('select');
                nameInp.addEventListener('input', (e) => fields[idx].name = e.target.value);
                labelInp.addEventListener('input', (e) => fields[idx].label = e.target.value);
                typeSel.addEventListener('change', (e) => fields[idx].type = e.target.value);
                div.querySelector('.remove-field').addEventListener('click', () => {
                    fields.splice(idx, 1);
                    renderFields();
                });
            });
        }

        document.getElementById('addFieldBtn').addEventListener('click', () => {
            fields.push({ name: 'field' + (fields.length+1), label: 'Новое поле', type: 'text' });
            renderFields();
        });

        document.getElementById('saveFormBtn').addEventListener('click', async () => {
            const name = document.getElementById('formName').value.trim();
            const desc = document.getElementById('formDesc').value;
            const isTable = document.getElementById('formType').value === 'true';
            if (!name) { alert('Введите название'); return; }
            if (fields.length === 0) { alert('Добавьте хотя бы одно поле'); return; }
            const namesSet = new Set();
            for (let f of fields) {
                if (!f.name || !f.label) { alert('Заполните имя и метку поля'); return; }
                if (namesSet.has(f.name)) { alert(`Поле с именем "${f.name}" повторяется`); return; }
                namesSet.add(f.name);
            }
            const newForm = createLocalForm(name, desc, fields, isTable);
            await pushFormToCloud(newForm);
            modal.remove();
            renderTherapist();
            showSuccess(`Форма "${name}" создана`);
        });
        document.getElementById('cancelModalBtn').addEventListener('click', () => modal.remove());
        renderFields();
    }

    // ----------  РЕНДЕР ПАЦИЕНТА ----------
    async function renderPatient() {
        const forms = getLocalForms();
        const availability = getLocalAvailability();
        const availableForms = forms.filter(f => availability[f.id] === true);
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="header">
                <h1>📝 Психотерапия и заполнение рабочих листов</h1>
                <button id="logoutBtnPatient" class="btn-outline">Выйти</button>
            </div>
            <div class="card">
                <div id="patientFormsContainer"></div>
            </div>
            <footer>${cloudEnabled ? '☁️ Данные синхронизируются с облаком' : '📀 Локальный режим (без облака)'}</footer>
        `;
        const container = document.getElementById('patientFormsContainer');
        if (availableForms.length === 0) {
            container.innerHTML = '<p>⏳ Нет доступных форм. Терапевт откроет их позже.</p>';
            document.getElementById('logoutBtnPatient').addEventListener('click', () => {
                currentRole = null;
                sessionStorage.removeItem('therapyRole');
                renderLogin();
            });
            return;
        }

        for (let form of availableForms) {
            const formCard = document.createElement('div');
            formCard.className = 'form-item';
            formCard.innerHTML = `
                <h3>${form.is_table ? '📊' : '📄'} ${form.name}</h3>
                <p style="font-size:0.85rem; margin-bottom:1rem;">${form.description || ''}</p>
                <div id="form-${form.id}" class="form-grid"></div>
                <div class="form-actions"><button class="save-btn" data-id="${form.id}">💾 Сохранить ответ</button></div>
                <div style="margin-top:1.5rem; font-weight:500;">📅 Мои предыдущие записи:</div>
                <div id="history-${form.id}"></div>
            `;
            container.appendChild(formCard);
            const fieldsContainer = formCard.querySelector(`#form-${form.id}`);
            const fields = form.fields || [];
            fields.forEach(field => {
                const div = document.createElement('div');
                div.className = 'field-group';
                div.innerHTML = `<label>${field.label}</label>
                                 <${field.type === 'textarea' ? 'textarea' : 'input'} 
                                    data-field="${field.name}" 
                                    ${field.type !== 'textarea' ? `type="${field.type}"` : ''}
                                    placeholder="${field.placeholder || ''}"></${field.type === 'textarea' ? 'textarea' : 'input'}>`;
                fieldsContainer.appendChild(div);
            });

            function loadHistory() {
                const responses = getLocalResponses();
                const formResponses = responses.filter(r => r.form_id === form.id);
                const historyDiv = formCard.querySelector(`#history-${form.id}`);
                if (formResponses.length === 0) {
                    historyDiv.innerHTML = '<p>Пока нет записей.</p>';
                    return;
                }
                if (form.is_table) {
                    let html = '<div class="table-responsive"> <table> <thead> <tr> <th>📅 Дата</th>';
                    form.fields.forEach(f => html += `<th>${f.label}</th>`);
                    html += '</tr> </thead> <tbody>';
                    formResponses.forEach(resp => {
                        html += `<tr> <td>${new Date(resp.created_at).toLocaleString()}</td>`;
                        form.fields.forEach(f => {
                            let val = resp.data[f.name] || '';
                            html += `<td>${val}</td>`;
                        });
                        html += `</tr>`;
                    });
                    html += '</tbody> </table> </div>';
                    historyDiv.innerHTML = html;
                } else {
                    let html = '';
                    formResponses.forEach(resp => {
                        html += `<div class="submissions"><strong>${new Date(resp.created_at).toLocaleString()}</strong><br>`;
                        form.fields.forEach(f => {
                            let val = resp.data[f.name];
                            if (val) html += `<span style="font-weight:500">${f.label}:</span> ${val}<br>`;
                        });
                        html += `</div>`;
                    });
                    historyDiv.innerHTML = html;
                }
            }
            loadHistory();

            const saveBtn = formCard.querySelector('.save-btn');
            saveBtn.addEventListener('click', async () => {
                const formData = {};
                fields.forEach(field => {
                    const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                    if (input) formData[field.name] = input.value;
                });
                if (Object.values(formData).every(v => !v || v.trim() === '')) {
                    alert('Заполните хотя бы одно поле.');
                    return;
                }
                addLocalResponse(form.id, formData);
                await pushResponseToCloud(form.id, formData);
                fields.forEach(field => {
                    const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                    if (input) input.value = '';
                });
                showSuccess('Ответ сохранён!');
                loadHistory();
            });
        }

        document.getElementById('logoutBtnPatient').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
    }

    // ----------  ВХОД ----------
    function renderLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="login-screen card">
                <h1 style="text-align:center;">🧠 Психотерапия и заполнение рабочих листов</h1>
                <p style="text-align:center; margin:1rem 0 2rem;">Введите код доступа</p>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Код</label>
                        <input type="password" id="accessCode" placeholder="••••" autocomplete="off">
                    </div>
                    <div class="form-actions">
                        <button id="loginBtn">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const code = document.getElementById('accessCode').value.trim();
            if (code === '1113') {
                currentRole = 'therapist';
                sessionStorage.setItem('therapyRole', 'therapist');
                await syncFormsFromCloud();
                await syncResponsesFromCloud();
                renderTherapist();
            } else if (code === '1') {
                currentRole = 'patient';
                sessionStorage.setItem('therapyRole', 'patient');
                await syncFormsFromCloud();
                await syncResponsesFromCloud();
                renderPatient();
            } else {
                alert('Неверный код');
            }
        });
    }

    // ----------  ЗАПУСК ----------
    (async () => {
        initLocalStorage();
        await initSupabase();   // пробуем подключиться к Supabase, но даже если нет – работаем локально
        const savedRole = sessionStorage.getItem('therapyRole');
        if (savedRole === 'therapist') {
            currentRole = 'therapist';
            await syncFormsFromCloud();
            await syncResponsesFromCloud();
            renderTherapist();
        } else if (savedRole === 'patient') {
            currentRole = 'patient';
            await syncFormsFromCloud();
            await syncResponsesFromCloud();
            renderPatient();
        } else {
            renderLogin();
        }
    })();
</script>
